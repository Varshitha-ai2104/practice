<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Detector</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #a0d8f1;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .weather-box {
            background: white;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            width: 300px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .weather-box h2 {
            margin-bottom: 15px;
        }

        input {
            padding: 10px;
            width: 90%;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button {
            padding: 10px 15px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #0056b3;
        }

        .result {
            margin-top: 15px;
            font-size: 18px;
        }

        .emoji {
            font-size: 40px;
            margin: 10px 0;
        }
    </style>
</head>
<body>

<div class="weather-box">
    <h2>🌦️ Weather Detector</h2>
    <input type="text" id="cityInput" placeholder="Enter city name">
    <button onclick="getWeather()">Check Weather</button>
    <div class="result" id="weatherResult"></div>
</div>

<script>
    const API_KEY = "61bab144acc7e04a0b852b1ec0fb0a53"; // Replace with your OpenWeatherMap API key

    async function getWeather() {
        const city = document.getElementById("cityInput").value;
        const url = `https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${API_KEY}&units=metric`;

        const response = await fetch(url);
        const data = await response.json();

        if (data.cod === "404") {
            document.getElementById("weatherResult").innerHTML = "<p>City not found!</p>";
            return;
        }

        const cityName = data.name;
        const temp = data.main.temp.toFixed(2);
        const condition = data.weather[0].description;
        const humidity = data.main.humidity;
        const icon = data.weather[0].icon;

        document.getElementById("weatherResult").innerHTML = `
            <p>📍 <b>City:</b> ${cityName}</p>
            <div class="emoji"><img src="http://openweathermap.org/img/wn/${icon}@2x.png" alt="icon"></div>
            <p>🌡️ <b>Temperature:</b> ${temp} °C</p>
            <p>🌦️ <b>Condition:</b> ${condition}</p>
            <p>💧 <b>Humidity:</b> ${humidity}%</p>
        `;
    }
</script>

</body>
</html>
